<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 360">

  <!-- Fond de la bande -->
  <rect x="0" y="0" width="70" height="360" rx="6" fill="#1e1a22" stroke="#3a2e30" stroke-width="1"/>

  <!-- Rail vertical -->
  <line x1="35" y1="20" x2="35" y2="310" stroke="#3a2e30" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Graduations -->
  <line x1="29" y1="20"  x2="41" y2="20"  stroke="#3a2e30" stroke-width="0.8"/>
  <line x1="29" y1="55"  x2="41" y2="55"  stroke="#3a2e30" stroke-width="0.8"/>
  <line x1="29" y1="90"  x2="41" y2="90"  stroke="#3a2e30" stroke-width="0.8"/>
  <line x1="27" y1="165" x2="43" y2="165" stroke="#4a3e3a" stroke-width="1.2"/>
  <line x1="29" y1="240" x2="41" y2="240" stroke="#3a2e30" stroke-width="0.8"/>
  <line x1="29" y1="275" x2="41" y2="275" stroke="#3a2e30" stroke-width="0.8"/>
  <line x1="29" y1="310" x2="41" y2="310" stroke="#3a2e30" stroke-width="0.8"/>

  <!-- Labels dB -->
  <text x="26" y="23"  font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">+12</text>
  <text x="26" y="58"  font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">+6</text>
  <text x="26" y="93"  font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">+3</text>
  <text x="26" y="168" font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">0</text>
  <text x="26" y="243" font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">-3</text>
  <text x="26" y="278" font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">-6</text>
  <text x="26" y="313" font-family="'Courier New', monospace" font-size="8" fill="#5a8a8a" text-anchor="end">-12</text>

  <!-- Niveau actif (du centre vers le haut, à mettre à jour via JS) -->
  <rect id="level" x="32" y="120" width="6" height="45"
        rx="2" fill="#1BBFBF" opacity="0.4"/>

  <!-- Bouton / handle -->
  <g id="handle" transform="translate(0, 120)">
    <rect x="7" y="-11" width="56" height="22" rx="4"
          fill="#2a2230" stroke="#1BBFBF" stroke-width="1.5"/>
    <line x1="20" y1="-4" x2="50" y2="-4"
          stroke="#1BBFBF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="0"  x2="50" y2="0"
          stroke="#1BBFBF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="4"  x2="50" y2="4"
          stroke="#1BBFBF" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Label fréquence en bas -->
  <text x="35" y="332" font-family="'Courier New', monospace" font-size="9"
        fill="#c87a6a" text-anchor="middle">1 kHz</text>

  <!-- Bordure subtile -->
  <rect x="1" y="1" width="68" height="358" rx="5"
        fill="none" stroke="#5a3a38" stroke-width="0.8" opacity="0.4"/>

</svg>